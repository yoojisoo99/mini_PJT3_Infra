apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: mini-project3
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # [중요] 테라폼에서 설정한 frontend 노드 그룹에만 배포되도록 설정
      nodeSelector:
        role: frontend
      containers:
      - name: frontend-container
        image: 805400277714.dkr.ecr.ap-northeast-2.amazonaws.com/team01-mini-project3/frontend:098a7392659f74e200ec56f05f79019275b1c492
        ports:
        - containerPort: 80 # Nginx 등을 사용하는 경우
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort