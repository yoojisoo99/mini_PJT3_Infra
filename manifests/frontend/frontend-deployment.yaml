apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: mini-project3
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # [1] 테라폼에서 설정한 frontend 노드 그룹에만 파드가 배치되도록 설정
      nodeSelector:
        role: frontend
      containers:
      - name: frontend-container
        image: 805400277714.dkr.ecr.ap-northeast-2.amazonaws.com/team01-mini-project3/frontend:8d011bb9b2d9ff6f41c8ed31e70537debd3e0535
        ports:
        - containerPort: 80