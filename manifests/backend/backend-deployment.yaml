apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: mini-project3
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # [1] 테라폼에서 설정한 backend 노드 그룹에만 파드가 배치되도록 설정
      nodeSelector:
        role: backend
      containers:
      - name: backend-container
        image: 805400277714.dkr.ecr.ap-northeast-2.amazonaws.com/team01-mini-project3/backend:1cab8a809f9c946654f4c7c4be3b1d2bcf07bef7
        ports:
        - containerPort: 8080 # Spring Boot 기본 포트
        env:
        - name: DB_HOST
          value: "terraform-20260508075842560200000001.c18y4gs8uo61.ap-northeast-2.rds.amazonaws.com"
        - name: REDIS_HOST
          value: "team01-mini-project3-redis.zahxnr.0001.apn2.cache.amazonaws.com:6379"
        - name: TZ
          value: Asia/Seoul  # 타임존을 서울로 설정
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"