name: "Terraform Infrastructure CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-cicd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # TF_VAR_를 붙이면 테라폼 variables.tf의 변수로 자동 주입됩니다
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }} 

    defaults:
      run:
        working-directory: ./terraform

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. 테라폼 초기화 
      - name: Terraform Init
        run: terraform init

      # 4. 코드 포맷 검사 (오타 및 스타일 체크)
      - name: Terraform Format
        run: terraform fmt -check
        continue-on-error: true        # 포맷 오류는 경고만

      - name: Terraform Validate
        run: terraform validate        # 추가: 문법/변수 오류 조기 차단

      # 5. 실행 계획 확인 (PR일 때만 작동하여 미리보기 제공) 
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan   # 항상 실행, artifact 저장

      # 6. 실제 인프라 반영 (Main 브랜치에 Push/Merge 되었을 때만 실행)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan # 저장된 plan만 적용